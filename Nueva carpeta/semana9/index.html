<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario - ITCA FEPADE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0e6ed 0%, #b3c6d8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-2px);
        }

        .header {
            background-color: #8B2323;
            color: #ffffff;
            padding: 25px;
            text-align: center;
        }

        .header h2 {
            font-size: 24px;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        form {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #34495e;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            color: #334155;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.15);
            background-color: #fafafa;
        }

        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
            font-weight: 500;
        }

        .form-group.success input {
            border-color: #2ecc71;
            background-color: #f8fff9;
        }

        .form-group.error input {
            border-color: #e74c3c;
            background-color: #fffbfa;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #34495e;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #2c3e50;
        }

        button:active {
            transform: scale(0.98);
        }

        .success-box {
            display: none;
            padding: 30px;
            text-align: center;
            color: #27ae60;
        }

        .success-box h3 {
            margin-bottom: 10px;
            font-size: 22px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>Registro de Usuario</h2>
            <p>Diseño de Páginas Web - ITCA FEPADE</p>
        </div>

        <form id="registroForm" novalidate>
            <div class="form-group" id="groupNombre">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Juan Pérez">
                <div class="error-message">El nombre debe tener al menos 3 caracteres.</div>
            </div>

            <div class="form-group" id="groupEmail">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="usuario@correo.com">
                <div class="error-message">Por favor, ingresa un correo electrónico válido.</div>
            </div>

            <div class="form-group" id="groupPassword">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres">
                <div class="error-message">La contraseña debe tener al menos 6 caracteres.</div>
            </div>

            <button type="submit">Registrar Cuenta</button>
        </form>

        <div id="successMessage" class="success-box">
            <h3>¡Registro Completado!</h3>
            <p>Los datos han sido validados e interactuados correctamente en el cliente.</p>
        </div>
    </div>

    <script>
        document.getElementById('registroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
n
            let formValido = true;


            const nombre = document.getElementById('nombre');
            const groupNombre = document.getElementById('groupNombre');
            if (nombre.value.trim().length < 3) {
                mostrarError(groupNombre);
                formValido = false;
            } else {
                mostrarExito(groupNombre);
            }

            const email = document.getElementById('email');
            const groupEmail = document.getElementById('groupEmail');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email.value.trim())) {
                mostrarError(groupEmail);
                formValido = false;
            } else {
                mostrarExito(groupEmail);
            }

            const password = document.getElementById('password');
            const groupPassword = document.getElementById('groupPassword');
            if (password.value.length < 6) {
                mostrarError(groupPassword);
                formValido = false;
            } else {
                mostrarExito(groupPassword);
            }

            if (formValido) {
                document.getElementById('registroForm').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
            }
        });

        function mostrarError(elementoGrupo) {
            elementoGrupo.classList.add('error');
            elementoGrupo.classList.remove('success');
            elementoGrupo.querySelector('.error-message').style.display = 'block';
        }

        function mostrarExito(elementoGrupo) {
            elementoGrupo.classList.add('success');
            elementoGrupo.classList.remove('error');
            elementoGrupo.querySelector('.error-message').style.display = 'none';
        }
    </script>
</body>
</html>
