<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio de refuezo</title>
</head>
<body>
    <h1>Registro de ususarios</h1>

    <div>
        <form id="FormnularioEstudiantes">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre">
            <br><br>
            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad">
            <br><br>
            <label for="nota1">Nota1:</label>
            <input type="number" id="nota1" name="nota1">
            <br><br>
            <label for="nota2">Nota2:</label>
            <input type="number" id="nota2" name="nota2">
            <br><br>
            <label for="nota3">Nota3:</label>
            <input type="number" id="nota3" name="nota3">
            <br><br>
            <button type="submit">Registrar notas de estudiantes</button>
        </form>
    </div>
    <hr>
    <div>
        <h2>Registro de la asignacion</h2>
        <table border="1">
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Edad</th>
                <th>Promedio</th>
                <th>Estado</th>
            </tr>
            </thead>
        </table>
    </div>
    <script src="app.js"></script>
</body>
</html>
