<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style7.css">
    <title>Carrito De Compras</title>
    <style>
        /* ── Navbar perfil de usuario ── */
        .nav-user {
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }
        .nav-user .user-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: 2px solid currentColor;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            color: inherit;
        }
        .nav-user .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #e67e22;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
        }
        .dropdown-menu {
            display: none;
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            min-width: 180px;
            z-index: 999;
            overflow: hidden;
        }
        .dropdown-menu.visible { display: block; }
        .dropdown-menu p {
            padding: 12px 16px;
            margin: 0;
            font-size: 0.85rem;
            color: #666;
            border-bottom: 1px solid #eee;
        }
        .dropdown-menu a, .dropdown-menu button {
            display: block;
            width: 100%;
            padding: 11px 16px;
            text-align: left;
            background: none;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            color: #333;
            text-decoration: none;
            box-sizing: border-box;
        }
        .dropdown-menu a:hover, .dropdown-menu button:hover { background: #f5f5f5; }
        .dropdown-menu .cerrar-sesion {
            color: #e74c3c;
            border-top: 1px solid #eee;
        }

        /* ── Carrito ── */
        .carrito-wrapper {
            max-width: 820px;
            margin: 120px auto 60px;
            padding: 0 20px;
        }
        .carrito-wrapper h1 {
            font-size: 2rem;
            margin-bottom: 24px;
            color: #333;
        }
        #carrito-vacio {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            font-size: 1.1rem;
        }
        #carrito-vacio a {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 24px;
            background: #8B0000;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }
        .carrito-tabla {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .carrito-tabla thead {
            background: #8B0000;
            color: white;
        }
        .carrito-tabla th, .carrito-tabla td {
            padding: 14px 18px;
            text-align: left;
            font-size: 0.95rem;
        }
        .carrito-tabla tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }
        .carrito-tabla tbody tr:last-child { border-bottom: none; }
        .carrito-tabla tbody tr:hover { background: #fdf5f5; }
        .cantidad-ctrl {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cantidad-ctrl button {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 6px;
            background: #eee;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 700;
            line-height: 1;
        }
        .cantidad-ctrl button:hover { background: #ddd; }
        .btn-eliminar {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .btn-eliminar:hover { background: #fdecea; }
        .carrito-resumen {
            margin-top: 24px;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .carrito-resumen .total-texto {
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
        }
        .carrito-resumen .total-texto span {
            color: #8B0000;
        }
        .carrito-acciones {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn-vaciar {
            padding: 10px 20px;
            border: 2px solid #e74c3c;
            background: none;
            color: #e74c3c;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .btn-vaciar:hover { background: #fdecea; }
        .btn-pedir {
            padding: 10px 24px;
            background: #8B0000;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
        }
        .btn-pedir:hover { background: #a00000; }

        /* Modal confirmación */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.visible { display: flex; }
        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 36px 32px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
        }
        .modal-box h2 { margin-bottom: 12px; color: #2d6a2d; font-size: 1.5rem; }
        .modal-box p { color: #555; margin-bottom: 24px; }
        .modal-box button {
            padding: 10px 28px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            background: #8B0000;
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href='https://postimg.cc/ZCjJCzRc' target='_blank'>
                    <img src='https://i.postimg.cc/Dw30p23t/La-Cocina-De-Don-Eliseo.jpg' border='0' alt='La-Cocina-De-Don-Eliseo'>
                </a>
                <div class="logo-text">
                    <h1>La Cocina De Don Eliseo</h1>
                    <span>(Don Cheyo)</span>
                </div>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="Contactos.html">Contacto</a></li>
                <li><a href="https://maps.app.goo.gl/NtpQv9xmypMXiiGEA?g_st=aw">Ubicacion</a></li>
                <li><a href="sobre_nosotros.html">Sobre Nosotros</a></li>
                <a href="Admin.html" id="tab-admin" style="display: none;">Panel de Control</a>
            </ul>
            <div class="nav-auth">
                <div id="nav-sesion"></div>
            </div>
        </div>
    </nav>

    <!-- Contenido del carrito -->
    <div class="carrito-wrapper">
        <h1>🛒 Carrito de Compras</h1>
        <div id="carrito-contenido"></div>
    </div>

    <!-- Modal de pedido confirmado -->
    <div class="modal-overlay" id="modal-confirmacion">
        <div class="modal-box">
            <h2>✅ ¡Pedido realizado!</h2>
            <p>Tu pedido ha sido recibido. Nos pondremos en contacto contigo pronto. ¡Gracias por elegirnos!</p>
            <button onclick="cerrarModal()">Volver al menú</button>
        </div>
    </div>

    <script>
        // ── Perfil de usuario en navbar ──
        const sesion = JSON.parse(localStorage.getItem('sesionActiva'));
        const navSesion = document.getElementById('nav-sesion');

        if (sesion) {
            const inicial = sesion.user.charAt(0).toUpperCase();
            navSesion.innerHTML = `
                <div class="nav-user">
                    <button class="user-btn" onclick="toggleDropdown()">
                        <div class="avatar">${inicial}</div>
                        ${sesion.user}
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <p>📧 ${sesion.email}</p>
                        <button class="cerrar-sesion" onclick="cerrarSesion()">🚪 Cerrar Sesión</button>
                    </div>
                </div>
            `;
        } else {
            navSesion.innerHTML = `<a href="Login.html">Inicio De Sesión</a>`;
        }

        function toggleDropdown() {
            document.getElementById('dropdownMenu').classList.toggle('visible');
        }
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('dropdownMenu');
            if (menu && !e.target.closest('.nav-user')) menu.classList.remove('visible');
        });
        function cerrarSesion() {
            localStorage.removeItem('sesionActiva');
            window.location.href = 'Login.html';
        }

        // ── Lógica del carrito ──
        function getCarrito() {
            return JSON.parse(localStorage.getItem('carrito')) || [];
        }
        function guardarCarrito(carrito) {
            localStorage.setItem('carrito', JSON.stringify(carrito));
        }

        function renderCarrito() {
            const carrito = getCarrito();
            const contenedor = document.getElementById('carrito-contenido');

            if (carrito.length === 0) {
                contenedor.innerHTML = `
                    <div id="carrito-vacio">
                        <p>🍽️ Tu carrito está vacío.</p>
                        <a href="menu.html">Ver el menú</a>
                    </div>
                `;
                return;
            }

            const total = carrito.reduce((sum, i) => sum + i.precio * i.cantidad, 0);

            let filas = carrito.map((item, idx) => `
                <tr>
                    <td>${item.nombre}</td>
                    <td>$${item.precio.toFixed(2)}</td>
                    <td>
                        <div class="cantidad-ctrl">
                            <button onclick="cambiarCantidad(${idx}, -1)">−</button>
                            <span>${item.cantidad}</span>
                            <button onclick="cambiarCantidad(${idx}, 1)">+</button>
                        </div>
                    </td>
                    <td>$${(item.precio * item.cantidad).toFixed(2)}</td>
                    <td><button class="btn-eliminar" onclick="eliminarItem(${idx})">🗑️</button></td>
                </tr>
            `).join('');

            contenedor.innerHTML = `
                <table class="carrito-tabla">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Precio</th>
                            <th>Cantidad</th>
                            <th>Subtotal</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>${filas}</tbody>
                </table>
                <div class="carrito-resumen">
                    <div class="total-texto">Total: <span>$${total.toFixed(2)}</span></div>
                    <div class="carrito-acciones">
                        <button class="btn-vaciar" onclick="vaciarCarrito()">🗑️ Vaciar carrito</button>
                        <button class="btn-pedir" onclick="realizarPedido()">✅ Realizar pedido</button>
                    </div>
                </div>
            `;
        }

        function cambiarCantidad(idx, delta) {
            const carrito = getCarrito();
            carrito[idx].cantidad += delta;
            if (carrito[idx].cantidad <= 0) carrito.splice(idx, 1);
            guardarCarrito(carrito);
            renderCarrito();
        }

        function eliminarItem(idx) {
            const carrito = getCarrito();
            carrito.splice(idx, 1);
            guardarCarrito(carrito);
            renderCarrito();
        }

        function vaciarCarrito() {
            if (confirm('¿Seguro que deseas vaciar el carrito?')) {
                localStorage.removeItem('carrito');
                renderCarrito();
            }
        }

        function realizarPedido() {
            localStorage.removeItem('carrito');
            document.getElementById('modal-confirmacion').classList.add('visible');
        }

        function cerrarModal() {
            document.getElementById('modal-confirmacion').classList.remove('visible');
            window.location.href = 'menu.html';
        }

        // Iniciar
        renderCarrito();
    </script>
</body>
</html>
