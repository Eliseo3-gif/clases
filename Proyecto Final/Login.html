<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>Login</title>
</head>
<body>
    <div class="wrapper">
        <form action="">
            <h1>Inicie Sesion</h1>
            <div class="input-box">
                <input type="text" id="loginUser" placeholder="Nombre de usuario" required>
                <i class='bx bxs-user'></i>
            </div>
            <div class="input-box">
                <input type="password" id="loginPassword" placeholder="Contraseña" required>
                <i class="bx bxs-lock-alt"></i>
            </div>
            <div class="remember-forget">
                <label><input type="checkbox">Acuérdame</label>
                <a href="Recuperar.html">Has Olvidado tu contraseña?</a>
            </div>
            <button type="submit" class="btn" onclick="validarYEntrar()">Acceder</button>
            <script>
                function validarYEntrar() {
                    const user = document.getElementById("loginUser").value;
                    const password = document.getElementById("loginPassword").value;

                    if (user === "admin" && password === "123456") {
                        window.location.href = "PaginaPrincipal.html";
                    } else {
                        alert("Nombre de usuario o contraseña incorrectos");
                    }
                }
            </script>
            <div class="register-link">
                <p>No tienes una cuenta?<a href="Registrate.html">Registrate</a></p>
            </div>
        </form>
    </div>
</body>
<script src="Script.js"></script>
</html>
