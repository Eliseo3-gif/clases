<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <title>Recuperar Contraseña</title>
</head>
<body>
    <div class="wrapper">
        <form id="recoveryForm">
            <h1>Recuperar Acceso</h1>
            <p style="text-align: center; margin-bottom: 20px;">Introduce tu correo para restablecer tu contraseña.</p>
            
            <div class="input-box">
                <input type="email" id="recoveryEmail" placeholder="Correo electrónico" required>
                <i class='bx bxs-envelope'></i>
            </div>

            <div class="input-box" id="newPassContainer" style="display: none;">
                <input type="password" id="newPassword" placeholder="Nueva contraseña">
                <i class='bx bxs-lock-open-alt'></i>
            </div>

            <button type="submit" class="btn" id="btnAction">Verificar Correo</button>

            <div class="register-link">
                <p>¿Recordaste tu clave? <a href="Login.html">Inicia sesión</a></p>
            </div>
        </form>
    </div>
    <script src="ScriptRecuperar.js"></script>
</body>
</html>
